<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>モヤモヤの錬金術師 — Edward</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Zen+Kaku+Gothic+New:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --void:   #0e0a06;
  --deep:   #1a1208;
  --panel:  #221a0e;
  --border: #3a2e1a;
  --red:    #c84a2a;
  --red-l:  #e87050;
  --red-d:  #8a2a10;
  --gold:   #c9a84c;
  --gold-l: #e8cc80;
  --gold-d: #8a6e2a;
  --ink-w:  #f0e8d8;
  --ink-dim:#8a7a68;
  --silver: #a8b0b8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--void);
  color: var(--ink-w);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  min-height: 100vh;
}

/* ── HEADER ── */
header {
  background: linear-gradient(180deg, #080604 0%, var(--deep) 100%);
  border-bottom: 1px solid var(--red-d);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-left { display: flex; flex-direction: column; gap: 3px; }
.header-logo {
  font-family: 'Noto Serif JP', serif;
  font-size: 20px;
  font-weight: 900;
  letter-spacing: 0.08em;
  background: linear-gradient(90deg, var(--red-l), var(--gold-l));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header-sub {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--ink-dim);
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
.header-badge {
  background: var(--red-d);
  color: var(--red-l);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--red);
  letter-spacing: 0.1em;
}

.api-wrap { display: flex; align-items: center; gap: 8px; }
.api-wrap label { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--ink-dim); }
.api-wrap input {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  color: var(--ink-w);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  width: 200px;
}
.api-wrap input:focus { outline: none; border-color: var(--red-d); }

/* ── MAIN ── */
main { max-width: 760px; margin: 0 auto; padding: 32px 24px; }

/* ── INTRO ── */
.intro-banner {
  background: linear-gradient(135deg, rgba(200,74,42,0.12), rgba(201,168,76,0.06));
  border: 1px solid var(--border);
  border-left: 4px solid var(--red);
  border-radius: 0 12px 12px 0;
  padding: 24px 28px;
  margin-bottom: 32px;
}
.intro-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 22px;
  font-weight: 900;
  margin-bottom: 8px;
  background: linear-gradient(90deg, var(--red-l), var(--gold-l));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.intro-desc {
  font-size: 13px;
  color: var(--ink-dim);
  line-height: 1.8;
}
.intro-desc strong { color: var(--ink-w); }

/* ── CHAT UI ── */
.chat-container {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 20px;
}

.chat-messages {
  min-height: 320px;
  max-height: 480px;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.msg {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform:none; } }

.msg.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  border: 1px solid var(--border);
}
.msg.ed .msg-avatar {
  background: linear-gradient(135deg, var(--red-d), var(--red));
  border-color: var(--red);
}
.msg.user .msg-avatar {
  background: rgba(255,255,255,0.06);
}

.msg-bubble {
  max-width: 80%;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.8;
}
.msg.ed .msg-bubble {
  background: rgba(200,74,42,0.12);
  border: 1px solid rgba(200,74,42,0.25);
  border-top-left-radius: 2px;
  color: var(--ink-w);
}
.msg.user .msg-bubble {
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-top-right-radius: 2px;
  color: var(--ink-w);
  text-align: right;
}

.msg-name {
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  color: var(--ink-dim);
  margin-bottom: 4px;
  letter-spacing: 0.1em;
}
.msg.user .msg-name { text-align: right; }

/* ── SEED CARD ── */
.seed-card {
  margin: 0 24px 24px;
  background: linear-gradient(135deg, rgba(201,168,76,0.12), rgba(200,74,42,0.08));
  border: 1px solid var(--gold-d);
  border-radius: 10px;
  padding: 20px;
  display: none;
}
.seed-card-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  color: var(--gold-l);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.seed-name {
  font-family: 'Noto Serif JP', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--gold-l);
  margin-bottom: 8px;
}
.seed-desc {
  font-size: 12px;
  color: var(--ink-dim);
  line-height: 1.7;
  margin-bottom: 16px;
}
.seed-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.seed-tag {
  background: rgba(201,168,76,0.15);
  border: 1px solid var(--gold-d);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 11px;
  color: var(--gold-l);
  font-family: 'DM Mono', monospace;
}
.seed-btn-row { display: flex; gap: 10px; flex-wrap: wrap; }

/* ── INPUT AREA ── */
.chat-input-area {
  border-top: 1px solid var(--border);
  padding: 16px 20px;
  display: flex;
  gap: 10px;
  align-items: flex-end;
  background: rgba(0,0,0,0.2);
}
.chat-input-area textarea {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--ink-w);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 13px;
  resize: none;
  min-height: 44px;
  max-height: 120px;
  line-height: 1.6;
}
.chat-input-area textarea:focus { outline: none; border-color: var(--red-d); }

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 700;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn-red { background: linear-gradient(135deg, var(--red-d), var(--red)); color: white; }
.btn-red:hover { filter: brightness(1.15); }
.btn-gold { background: linear-gradient(135deg, var(--gold-d), var(--gold)); color: var(--void); font-weight: 900; }
.btn-gold:hover { filter: brightness(1.1); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--ink-dim); }
.btn-outline:hover { border-color: var(--gold-d); color: var(--ink-w); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }

/* ── SPINNER ── */
.spinner {
  width: 13px; height: 13px;
  border: 2px solid rgba(255,255,255,0.2);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── PROGRESS ── */
.progress-bar {
  display: flex;
  gap: 4px;
  padding: 12px 24px;
  background: rgba(0,0,0,0.15);
  border-bottom: 1px solid var(--border);
}
.progress-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border);
  transition: all 0.3s;
}
.progress-dot.active { background: var(--red); box-shadow: 0 0 6px var(--red); }
.progress-dot.done { background: var(--gold-d); }

/* ── ALPHONSE LINK ── */
.al-link-card {
  background: linear-gradient(135deg, rgba(42,90,122,0.15), rgba(122,90,191,0.1));
  border: 1px solid rgba(122,90,191,0.3);
  border-radius: 12px;
  padding: 20px 24px;
  margin-top: 20px;
  display: none;
}
.al-link-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 14px;
  color: #a888e8;
  margin-bottom: 8px;
}
.al-link-desc {
  font-size: 12px;
  color: var(--ink-dim);
  line-height: 1.7;
  margin-bottom: 12px;
}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="header-logo">モヤモヤの錬金術師</span>
    <span class="header-sub">The Alchemist of Moyamoya — Edward #032</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="header-badge">QQ #032</span>
    <div class="api-wrap">
      <label>API KEY</label>
      <input type="password" id="apiKey" placeholder="sk-ant-..." oninput="saveKey(this.value)">
    </div>
  </div>
</header>

<main>

  <div class="intro-banner">
    <div class="intro-title">🔴 アプリを作りたいけど、何から始めればいいかわからない——</div>
    <div class="intro-desc">
      そのモヤモヤ、話してみてください。<br>
      <strong>エドワード</strong>があなたの言葉を聞いて、<strong>アプリの種</strong>を一緒に見つけます。<br>
      難しく考えなくていい。声に出すつもりで、ざっくりと。
    </div>
  </div>

  <div class="chat-container">
    <div class="progress-bar" id="progressBar">
      <div class="progress-dot active" id="dot0"></div>
      <div class="progress-dot" id="dot1"></div>
      <div class="progress-dot" id="dot2"></div>
      <div class="progress-dot" id="dot3"></div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="seed-card" id="seedCard">
      <div class="seed-card-title">✨ アプリの種が見つかりました</div>
      <div class="seed-name" id="seedName"></div>
      <div class="seed-desc" id="seedDesc"></div>
      <div class="seed-tags" id="seedTags"></div>
      <div class="seed-btn-row">
        <button class="btn btn-gold" onclick="passToAlphonse()">アルフォンスに渡す →</button>
        <button class="btn btn-outline" onclick="continueChat()">もう少し話す</button>
        <button class="btn btn-outline" onclick="resetAll()">最初からやり直す</button>
      </div>
    </div>

    <div class="chat-input-area" id="inputArea">
      <textarea id="userInput" placeholder="モヤモヤを話してください…" rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
        oninput="autoResize(this)"></textarea>
      <button class="btn btn-red" id="sendBtn" onclick="sendMessage()">
        <span id="sendBtnText">送る</span>
      </button>
    </div>
  </div>

  <div class="al-link-card" id="alLinkCard">
    <div class="al-link-title">🔵 アルフォンスへ — 種を育てる</div>
    <div class="al-link-desc">
      エドワードで見つけた種を、アルフォンスに渡すと要件定義とREADMEを生成できます。<br>
      アルフォンスは別のHTMLファイルとして動作します。
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn btn-outline" onclick="copyToClipboard()">📋 種のデータをコピー</button>
      <button class="btn btn-outline" onclick="resetAll()">🔄 最初からやり直す</button>
    </div>
  </div>

</main>

<script>
// ── STATE ──
const state = {
  apiKey: localStorage.getItem('moyamoya_apikey') || '',
  history: [],
  turnCount: 0,
  seed: null,
  maxTurns: 4
};

if (state.apiKey) document.getElementById('apiKey').value = state.apiKey;
function saveKey(v) { state.apiKey = v; localStorage.setItem('moyamoya_apikey', v); }

// ── SYSTEM PROMPT (エドワードのキャラ) ──
const SYSTEM_PROMPT = `あなたは「エドワード」——モヤモヤの錬金術師です。
アプリを作りたいけど何から始めればいいかわからない初心者ユーザーと対話します。

あなたのスタイル：
- ユーザーの曖昧な言葉を丁寧に言語化する（「それってこういうこと？」と確認する）
- 「作りたいもの」より「困っていること」「面倒なこと」を先に聞く
- 壮大な要件が出てきたら「まず一つに絞ろう」と優しく誘導する
- 専門用語を使わない。口語で話す
- 短く返す。長文にしない（3〜4文まで）
- 3〜4ターンで「アプリの種」を一つ見つけることを目指す

ターン${state.maxTurns}になったら、または明確な種が見つかったら：
以下のJSON形式で種を提示してください（通常のテキストの後に続けて）：

SEED_JSON:{"app_name":"アプリ名（日本語）","app_name_en":"App Name","description":"このアプリが解決すること（1〜2文）","keywords":["キーワード1","キーワード2","キーワード3"],"first_step":"最初に作るべき最小単位"}

JSONは必ずSEED_JSON:で始めてください。`;

// ── INIT ──
window.onload = () => {
  addMessage('ed', 'エドワード', `やあ。\n\nアプリを作りたいんだね。\n\nまず聞かせて——**今、何が面倒？** どんな小さいことでもいいよ。`);
};

// ── ADD MESSAGE ──
function addMessage(role, name, text) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = role === 'ed' ? '⚗️' : '🙋';
  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div>
      <div class="msg-name">${name}</div>
      <div class="msg-bubble">${text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>')}</div>
    </div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// ── SEND MESSAGE ──
async function sendMessage() {
  const apiKey = state.apiKey || document.getElementById('apiKey').value.trim();
  const input = document.getElementById('userInput').value.trim();
  if (!apiKey) { alert('APIキーを入力してください。'); return; }
  if (!input) return;

  // Add user message
  addMessage('user', 'あなた', input);
  state.history.push({ role: 'user', content: input });
  state.turnCount++;

  document.getElementById('userInput').value = '';
  autoResize(document.getElementById('userInput'));

  const btn = document.getElementById('sendBtn');
  const btnText = document.getElementById('sendBtnText');
  btn.disabled = true;
  btnText.innerHTML = '<span class="spinner"></span>';

  // Update progress
  updateProgress();

  // Build messages
  const messages = state.history.map(h => ({ role: h.role, content: h.content }));

  // Add turn hint if near end
  if (state.turnCount >= state.maxTurns - 1) {
    messages[messages.length - 1].content += '\n\n（そろそろアプリの種をまとめてください）';
  }

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        system: SYSTEM_PROMPT,
        messages
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const raw = data.content[0].text;

    // Check for SEED_JSON
    const seedMatch = raw.match(/SEED_JSON:(\{[\s\S]*\})/);
    let displayText = raw;

    if (seedMatch) {
      displayText = raw.replace(/SEED_JSON:[\s\S]*/, '').trim();
      try {
        const seed = JSON.parse(seedMatch[1]);
        state.seed = seed;
        showSeed(seed);
      } catch(e) { /* ignore parse error */ }
    }

    if (displayText) {
      addMessage('ed', 'エドワード', displayText);
      state.history.push({ role: 'assistant', content: raw });
    }

  } catch(e) {
    alert('エラー: ' + e.message);
  } finally {
    btn.disabled = false;
    btnText.textContent = '送る';
  }
}

// ── SHOW SEED ──
function showSeed(seed) {
  document.getElementById('seedName').textContent = `📦 ${seed.app_name}`;
  document.getElementById('seedDesc').textContent = seed.description;
  document.getElementById('seedTags').innerHTML = seed.keywords
    .map(k => `<span class="seed-tag">${k}</span>`).join('');
  document.getElementById('seedCard').style.display = 'block';
  document.getElementById('inputArea').style.display = 'none';
  document.getElementById('seedCard').scrollIntoView({ behavior: 'smooth' });
}

// ── PASS TO ALPHONSE ──
function passToAlphonse() {
  if (!state.seed) return;
  localStorage.setItem('ed_to_al_seed', JSON.stringify(state.seed));
  document.getElementById('alLinkCard').style.display = 'block';
  document.getElementById('alLinkCard').scrollIntoView({ behavior: 'smooth' });
  alert('種をlocalStorageに保存しました！\nアルフォンス（alphonse.html）を開いてください。');
}

function copyToClipboard() {
  if (!state.seed) return;
  navigator.clipboard.writeText(JSON.stringify(state.seed, null, 2));
  alert('コピーしました！');
}

function continueChat() {
  document.getElementById('seedCard').style.display = 'none';
  document.getElementById('inputArea').style.display = 'flex';
  document.getElementById('userInput').focus();
}

// ── PROGRESS ──
function updateProgress() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById(`dot${i}`);
    if (i < state.turnCount) dot.className = 'progress-dot done';
    else if (i === state.turnCount) dot.className = 'progress-dot active';
    else dot.className = 'progress-dot';
  }
}

// ── AUTO RESIZE ──
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── RESET ──
function resetAll() {
  if (!confirm('最初からやり直しますか？')) return;
  state.history = [];
  state.turnCount = 0;
  state.seed = null;
  document.getElementById('chatMessages').innerHTML = '';
  document.getElementById('seedCard').style.display = 'none';
  document.getElementById('alLinkCard').style.display = 'none';
  document.getElementById('inputArea').style.display = 'flex';
  document.getElementById('userInput').value = '';
  updateProgress();
  addMessage('ed', 'エドワード', `やあ。\n\nアプリを作りたいんだね。\n\nまず聞かせて——**今、何が面倒？** どんな小さいことでもいいよ。`);
}
</script>
</body>
</html>
